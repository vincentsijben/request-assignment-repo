name: Self-Service Repo Intake

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: intake-${{ github.event.issue.id }}
  cancel-in-progress: false

jobs:
  process-request:
    if: contains(github.event.issue.labels.*.name, 'repo-request') || contains(github.event.issue.body, '### repoName')
    runs-on: ubuntu-latest
    steps:
      - name: Validate request and provision repo
        id: intake
        uses: actions/github-script@v7
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          TARGET_OWNER: ${{ vars.TARGET_OWNER }}
          ALLOWED_TARGET_OWNERS: ${{ vars.ALLOWED_TARGET_OWNERS }}
          REPO_VISIBILITY: ${{ vars.REPO_VISIBILITY }}
          TEMPLATE_OWNER: ${{ vars.TEMPLATE_OWNER }}
          TEMPLATE_REPO: ${{ vars.TEMPLATE_REPO }}
          ALLOWED_EMAIL_DOMAIN: ${{ vars.ALLOWED_EMAIL_DOMAIN }}
          ALLOWED_CLASSROOM_REGEX: ${{ vars.ALLOWED_CLASSROOM_REGEX }}
          MAX_REQUESTS_PER_DAY: ${{ vars.MAX_REQUESTS_PER_DAY }}
          MIN_ACCOUNT_AGE_DAYS: ${{ vars.MIN_ACCOUNT_AGE_DAYS }}
          REQUEST_CODE: ${{ secrets.REQUEST_CODE }}
          OWNER_TO_NOTIFY: ${{ github.repository_owner }}
        with:
          github-token: ${{ secrets.ADMIN_TOKEN || github.token }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueBody = issue.body || "";
            const issueUrl = issue.html_url || `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issue.number}`;
            const actor = (issue.user && issue.user.login) ? issue.user.login : "";
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const ADMIN_TOKEN = (process.env.ADMIN_TOKEN || "").trim();
            const TARGET_OWNER_DEFAULT = (process.env.TARGET_OWNER || "").trim();
            const ALLOWED_TARGET_OWNERS = (process.env.ALLOWED_TARGET_OWNERS || "").trim();
            const REPO_VISIBILITY = (process.env.REPO_VISIBILITY || "private").trim().toLowerCase();
            const TEMPLATE_OWNER = (process.env.TEMPLATE_OWNER || "").trim();
            const TEMPLATE_REPO = (process.env.TEMPLATE_REPO || "").trim();
            const ALLOWED_EMAIL_DOMAIN = (process.env.ALLOWED_EMAIL_DOMAIN || "zuyd.nl").trim().toLowerCase();
            const ALLOWED_CLASSROOM_REGEX = (process.env.ALLOWED_CLASSROOM_REGEX || "").trim();
            const MAX_REQUESTS_PER_DAY = Number(process.env.MAX_REQUESTS_PER_DAY || "10");
            const MIN_ACCOUNT_AGE_DAYS = Number(process.env.MIN_ACCOUNT_AGE_DAYS || "3");
            const REQUEST_CODE = (process.env.REQUEST_CODE || "").trim();
            const OWNER_TO_NOTIFY = (process.env.OWNER_TO_NOTIFY || repoOwner).trim();
            const REDACTED_ACCESS_CODE = "[REDACTED]";

            let fullName = "";
            let email = "";
            let classroom = "";
            let repoTarget = "";
            let alertStatus = "Processing";
            let alertReply = "No issue reply was posted.";

            function setAlertOutputs() {
              const subject = `[Repo Intake] ${alertStatus} issue #${issueNumber}`;
              const body = [
                `Repository: ${repoOwner}/${repoName}`,
                `Issue: #${issueNumber}`,
                `Issue URL: ${issueUrl}`,
                `Requester: @${actor || "unknown"}`,
                "",
                "Submitted data:",
                `- Full name: ${fullName || "(empty)"}`,
                `- Email: ${email || "(empty)"}`,
                `- Classroom: ${classroom || "(empty)"}`,
                `- repoName: ${repoTarget || "(empty)"}`,
                `- Access code: ${REDACTED_ACCESS_CODE}`,
                "",
                "Issue reply:",
                alertReply,
              ].join("\n");

              core.setOutput("send_alert", "true");
              core.setOutput("alert_subject", subject);
              core.setOutput("alert_body", body);
            }

            function failAndNotify(message) {
              alertStatus = "Failed";
              alertReply = message;
              setAlertOutputs();
              core.setFailed(message);
            }

            const alreadyProcessed = (issue.labels || []).some((label) => {
              const name = typeof label === "string" ? label : label.name;
              return String(name || "").toLowerCase() === "request-processed";
            });
            if (alreadyProcessed) {
              core.setOutput("send_alert", "false");
              return;
            }

            function sanitizeRepoPart(value) {
              return String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "-")
                .replace(/[^\p{L}\p{N}._-]+/gu, "-")
                .replace(/-+/g, "-")
                .replace(/^-+|-+$/g, "");
            }

            function escapeRegExp(value) {
              return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getField(label) {
              const re = new RegExp(`###\\s*${escapeRegExp(label)}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s|$)`, "i");
              const match = issueBody.match(re);
              if (!match) {
                return "";
              }
              return String(match[1] || "").trim();
            }

            async function issueComment(body) {
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber,
                body,
              });
            }

            async function assignOwner() {
              try {
                await github.rest.issues.addAssignees({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  assignees: [OWNER_TO_NOTIFY],
                });
              } catch {
                // Do not fail intake if assignment is unavailable.
              }
            }

            async function rejectAndClose(message, labels = ["request-rejected"]) {
              await addLabels(labels);
              const replyBody = [message, "", `@${OWNER_TO_NOTIFY} action completed.`].join("\n");
              await issueComment(replyBody);
              alertStatus = "Rejected";
              alertReply = replyBody;
              setAlertOutputs();
              await closeIssue();
            }

            async function addLabels(labels) {
              if (!labels.length) return;
              await github.rest.issues.addLabels({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber,
                labels,
              });
            }

            async function closeIssue() {
              await github.rest.issues.update({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber,
                state: "closed",
              });
            }

            async function redactAccessCodeInIssueBody(accessCode) {
              if (!accessCode) return;
              const updated = issueBody.replace(
                /(###\s*Access code\s*\n+)([\s\S]*?)(?=\n###\s|$)/i,
                `$1${REDACTED_ACCESS_CODE}`
              );
              if (updated !== issueBody) {
                await github.rest.issues.update({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  body: updated,
                });
              }
            }

            fullName = getField("Full name");
            email = getField("Email").toLowerCase();
            classroom = getField("Classroom");
            repoTarget = getField("repoName");

            if (!REQUEST_CODE) {
              failAndNotify("Missing secret REQUEST_CODE.");
              return;
            }

            await assignOwner();

            if (!actor || actor.endsWith("[bot]")) {
              await rejectAndClose("Request rejected: bot or invalid GitHub account.");
              return;
            }

            const desiredTitle = `request assignment for ${actor}`;
            if ((issue.title || "") !== desiredTitle) {
              await github.rest.issues.update({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber,
                title: desiredTitle,
              });
            }

            const enteredAccessCode = getField("Access code");
            const accessCode = enteredAccessCode === REDACTED_ACCESS_CODE ? REQUEST_CODE : enteredAccessCode;

            if (fullName.split(/\s+/).filter(Boolean).length < 2) {
              await rejectAndClose("Request rejected: please enter your full name (first and last name).");
              return;
            }

            const parts = repoTarget.split("/").map((v) => v.trim()).filter(Boolean);
            if (parts.length !== 2) {
              await rejectAndClose("Request rejected: repoName must be in owner/prefix format.");
              return;
            }

            const targetOwner = parts[0];
            const selectedPrefix = parts[1];

            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRe.test(email)) {
              await rejectAndClose("Request rejected: invalid email format.");
              return;
            }

            const ownerRe = /^[A-Za-z0-9](?:[A-Za-z0-9-]{0,38})$/;
            if (!targetOwner || !ownerRe.test(targetOwner)) {
              await rejectAndClose("Request rejected: invalid organization/owner format.");
              return;
            }

            const prefixRe = /^[a-z0-9._-]{2,80}$/;
            if (!selectedPrefix || !prefixRe.test(selectedPrefix)) {
              await rejectAndClose("Request rejected: invalid repository prefix format in repoName.");
              return;
            }

            if (ALLOWED_TARGET_OWNERS) {
              const allowedOwners = ALLOWED_TARGET_OWNERS
                .split(/[\n,]+/)
                .map((v) => v.trim().toLowerCase())
                .filter(Boolean);
              if (!allowedOwners.includes(targetOwner.toLowerCase())) {
                await rejectAndClose("Request rejected: organization/owner is not allowed.");
                return;
              }
            } else if (TARGET_OWNER_DEFAULT && targetOwner.toLowerCase() !== TARGET_OWNER_DEFAULT.toLowerCase()) {
              await rejectAndClose("Request rejected: organization/owner does not match configured target.");
              return;
            }

            if (ALLOWED_EMAIL_DOMAIN && !email.endsWith(`@${ALLOWED_EMAIL_DOMAIN}`)) {
              await rejectAndClose(`Request rejected: this is not your school address. Please use your @${ALLOWED_EMAIL_DOMAIN} email address.`);
              return;
            }

            if (ALLOWED_CLASSROOM_REGEX) {
              try {
                const classroomRe = new RegExp(ALLOWED_CLASSROOM_REGEX);
                if (!classroomRe.test(classroom)) {
                  await rejectAndClose("Request rejected: classroom format is not allowed.");
                  return;
                }
              } catch {
                failAndNotify("Invalid ALLOWED_CLASSROOM_REGEX variable.");
                return;
              }
            }

            if (accessCode !== REQUEST_CODE) {
              await rejectAndClose("Request rejected: invalid access code.", ["request-rejected", "invalid-code"]);
              return;
            }

            if (enteredAccessCode !== REDACTED_ACCESS_CODE) {
              await redactAccessCodeInIssueBody(enteredAccessCode);
            }

            if (!ADMIN_TOKEN) {
              await rejectAndClose("Request rejected: repository provisioning is not configured correctly. ADMIN_TOKEN is missing.", ["request-rejected", "configuration-error"]);
              return;
            }

            function isRepoRequestIssue(item) {
              if (item.pull_request) return false;
              const labels = item.labels || [];
              return labels.some((label) => {
                const name = typeof label === "string" ? label : label.name;
                return String(name || "").toLowerCase() === "repo-request";
              });
            }

            // Basic rate-limit per account per 24h.
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const sameUserIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: repoOwner,
              repo: repoName,
              creator: actor,
              state: "all",
              since,
              per_page: 100,
            });
            const requestIssues = sameUserIssues.filter(isRepoRequestIssue);
            const uniqueIssueNumbers = new Set(requestIssues.map((item) => item.number));
            uniqueIssueNumbers.delete(issueNumber);
            if (uniqueIssueNumbers.size >= Math.max(1, MAX_REQUESTS_PER_DAY)) {
              await rejectAndClose("Request rejected: too many requests in the last 24 hours.", ["request-rejected", "rate-limited"]);
              return;
            }

            // Minimum account age check.
            const user = await github.rest.users.getByUsername({ username: actor });
            const createdAt = new Date(user.data.created_at).getTime();
            const ageDays = Math.floor((Date.now() - createdAt) / (24 * 60 * 60 * 1000));
            if (ageDays < Math.max(0, MIN_ACCOUNT_AGE_DAYS)) {
              await rejectAndClose(`Request rejected: account too new (${ageDays} days).`, ["request-rejected", "new-account"]);
              return;
            }

            const handlePart = sanitizeRepoPart(actor);
            if (!handlePart) {
              await rejectAndClose("Request rejected: could not derive repository name from GitHub username.");
              return;
            }

            const targetRepoName = `${selectedPrefix}${handlePart}`;

            let exists = true;
            try {
              await github.rest.repos.get({ owner: targetOwner, repo: targetRepoName });
            } catch (error) {
              if (error.status === 404) {
                exists = false;
              } else {
                throw error;
              }
            }

            let targetUrl = `https://github.com/${targetOwner}/${targetRepoName}`;

            if (!exists) {
              const description = `Assignment repository for ${fullName} (${classroom})`;
              const privateRepo = REPO_VISIBILITY !== "public";
              const templateOwner = TEMPLATE_OWNER || targetOwner;
              const templateRepoName = TEMPLATE_REPO || `${selectedPrefix}startercode`;

              try {
                await github.rest.repos.createUsingTemplate({
                  template_owner: templateOwner,
                  template_repo: templateRepoName,
                  owner: targetOwner,
                  name: targetRepoName,
                  private: privateRepo,
                  include_all_branches: false,
                  description,
                });
              } catch (error) {
                if (error.status === 404) {
                  await rejectAndClose(
                    `Request rejected: template repository ${templateOwner}/${templateRepoName} was not found.`,
                    ["request-rejected", "template-missing"]
                  );
                  return;
                }
                if (error.status === 403) {
                  await rejectAndClose(
                    `Request rejected: no permission to use template repository ${templateOwner}/${templateRepoName}.`,
                    ["request-rejected", "template-no-access"]
                  );
                  return;
                }
                throw error;
              }
            }

            // Ensure student has push access.
            await github.rest.repos.addCollaborator({
              owner: targetOwner,
              repo: targetRepoName,
              username: actor,
              permission: "push",
            });

            const statusLine = exists
              ? "Repository already existed. Access granted."
              : "Repository created and access granted.";

            const body = [
              statusLine,
              "",
              `${targetUrl}`,
            ].join("\n");

            await addLabels(["request-processed"]);
            await issueComment(body);
            alertStatus = "Success";
            alertReply = body;
            setAlertOutputs();
            await closeIssue();

      - name: Send Gmail alert
        if: always() && steps.intake.outputs.send_alert == 'true' && env.GMAIL_SMTP_USERNAME != '' && env.GMAIL_SMTP_APP_PASSWORD != '' && env.GMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        env:
          GMAIL_SMTP_USERNAME: ${{ secrets.GMAIL_SMTP_USERNAME }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_SMTP_USERNAME }}
          password: ${{ env.GMAIL_SMTP_APP_PASSWORD }}
          subject: ${{ steps.intake.outputs.alert_subject }}
          to: ${{ env.GMAIL_TO }}
          from: Repo Intake Bot <${{ env.GMAIL_SMTP_USERNAME }}>
          body: ${{ steps.intake.outputs.alert_body }}
