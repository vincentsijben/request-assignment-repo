name: Request Assignment Repository
description: Request a private assignment repository
title: "request assignment repo"
labels:
  - repo-request
assignees:
  - vincentsijben
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request your assignment repository.

        What happens after you submit:
        - If your request is valid, your repository is created and you get access.
        - This issue receives a confirmation or rejection message with next steps (refresh the page after a minute if nothing shows up).

        Fill in all fields. Your GitHub username is detected automatically from your account.

  - type: input
    id: full_name
    attributes:
      label: Full name
      description: First name and last name
      placeholder: Jane Doe
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email
      description: School email address
      placeholder: 123456sijben@zuyd.nl
    validations:
      required: true

  - type: input
    id: classroom
    attributes:
      label: Classroom
      description: Your classroom (for example CMD1A)
      placeholder: CMD1A
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Target as organisation/prefix, for example mia-mmt4-2526/final or mia-mmt1-2627/final-second
      placeholder: mia-mmt4-2526/final
    validations:
      required: true

  - type: input
    id: access_code
    attributes:
      label: Access code
      description: The current request code from Moodle
      placeholder: Enter code
    validations:
      required: true
